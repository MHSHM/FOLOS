<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Dashboard</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --header-bg: #f9fafb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            padding: 30px 20px;
            color: var(--text-main);
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            color: var(--text-main);
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--header-bg);
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover:not(.month-header) {
            background-color: #f8fafc;
        }

        .month-header {
            background-color: #f1f5f9 !important;
        }

        .month-title {
            font-weight: 600;
            color: var(--text-main);
            font-size: 15px;
        }

        .month-total {
            font-weight: 600;
            color: var(--text-main);
            font-size: 15px;
            text-align: right;
        }

        .amount {
            font-weight: 600;
            color: var(--success);
        }

        .note-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .note-text {
            font-size: 14px;
            color: var(--text-muted);
            font-style: italic;
        }

        .log-time {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Buttons */
        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit {
            background: #e0e7ff;
            color: #4338ca;
            font-size: 12px;
            padding: 6px 12px;
        }

            .btn-edit:hover {
                background: #c7d2fe;
            }

        .btn-delete {
            background: transparent;
            color: var(--danger);
            font-size: 13px;
            padding: 6px 12px;
            border: 1px solid var(--danger);
        }

            .btn-delete:hover {
                background: var(--danger);
                color: white;
            }

        .btn-clear {
            background: var(--danger);
            color: white;
            padding: 10px 16px;
            font-size: 14px;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.2);
        }

            .btn-clear:hover {
                background: var(--danger-hover);
            }

        .empty-state {
            text-align: center;
            padding: 40px !important;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1>Transaction Dashboard</h1>
            <button class="btn-clear" onclick="clearAllTransactions()">Clear All</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Merchant</th>
                        <th>Amount</th>
                        <th>Notes</th>
                        <th>System Log Time</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tx-table-body">
                    <tr><td colspan="7" class="empty-state">Loading transactions...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadTransactions() {
            try {
                const response = await fetch('/api/transactions');
                const data = await response.json();
                const tbody = document.getElementById('tx-table-body');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No transactions found.</td></tr>';
                    return;
                }

                const grouped = {};
                data.forEach(tx => {
                    const month = (tx.date && tx.date !== "Unknown") ? tx.date.substring(0, 7) : "Unknown";

                    if (!grouped[month]) {
                        grouped[month] = { transactions: [], totals: {} };
                    }
                    grouped[month].transactions.push(tx);

                    if (!grouped[month].totals[tx.currency]) {
                        grouped[month].totals[tx.currency] = 0;
                    }
                    grouped[month].totals[tx.currency] += Number(tx.amount);
                });

                const sortedMonths = Object.keys(grouped).sort((a, b) => {
                    if (a === "Unknown") return 1;
                    if (b === "Unknown") return -1;
                    return b.localeCompare(a);
                });

                sortedMonths.forEach(month => {
                    const group = grouped[month];

                    let monthName = "⚠️ Unknown Date";
                    if (month !== "Unknown") {
                        const dateObj = new Date(month + "-01");
                        monthName = "📅 " + dateObj.toLocaleString('default', { month: 'long', year: 'numeric' });
                    }

                    const totalStr = Object.entries(group.totals)
                        .map(([currency, amount]) => `${amount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ${currency}`)
                        .join(' + ');

                    // 1. Render Month Header
                    const headerRow = document.createElement('tr');
                    headerRow.className = 'month-header';
                    headerRow.innerHTML = `
                            <td colspan="4" class="month-title">${monthName}</td>
                            <td colspan="3" class="month-total">Total: ${totalStr}</td>
                        `;
                    tbody.appendChild(headerRow);

                    // 2. Render Transactions
                    group.transactions.forEach(tx => {
                        const safeNote = tx.notes ? tx.notes.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                        const displayNote = tx.notes || '—';

                        const row = document.createElement('tr');
                        row.innerHTML = `
                                <td style="color: var(--text-muted);">#${tx.id}</td>
                                <td>${tx.date}</td>
                                <td style="font-weight: 500;">${tx.merchant}</td>
                                <td class="amount">${Number(tx.amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ${tx.currency}</td>
                                <td>
                                    <div class="note-container">
                                        <span class="note-text">${displayNote}</span>
                                        <button class="btn-edit" onclick="editNote(${tx.id}, '${safeNote}')">Edit</button>
                                    </div>
                                </td>
                                <td class="log-time">${tx.created_at}</td>
                                <td>
                                    <button class="btn-delete" onclick="deleteTransaction(${tx.id})">Delete</button>
                                </td>
                            `;
                        tbody.appendChild(row);
                    });
                });
            } catch (err) {
                console.error('Failed to fetch transactions', err);
                const tbody = document.getElementById('tx-table-body');
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state" style="color: var(--danger);">Error loading transactions. Make sure your API is running.</td></tr>';
            }
        }

        async function editNote(id, currentNote) {
            const newNote = prompt(`Enter note for transaction #${id}:`, currentNote);
            if (newNote === null) return;

            try {
                const response = await fetch(`/api/transactions/${id}/note`, {
                    method: 'PUT',
                    body: newNote
                });
                if (response.ok) {
                    loadTransactions();
                } else {
                    alert('Failed to update note.');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred while saving the note.');
            }
        }

        async function deleteTransaction(id) {
            if (!confirm(`Are you sure you want to delete transaction #${id}?`)) return;
            try {
                const response = await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
                if (response.ok) loadTransactions();
                else alert('Failed to delete transaction.');
            } catch (err) {
                alert('An error occurred while deleting.');
            }
        }

        async function clearAllTransactions() {
            if (!confirm('WARNING: Are you sure you want to delete ALL transactions? This cannot be undone.')) return;
            try {
                const response = await fetch('/api/transactions', { method: 'DELETE' });
                if (response.ok) loadTransactions();
                else alert('Failed to clear database.');
            } catch (err) {
                alert('An error occurred while clearing.');
            }
        }

        loadTransactions();
    </script>
</body>
</html>
